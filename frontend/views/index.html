<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Job Dashboard</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    button { padding: 10px 20px; cursor: pointer; }
    #result { margin-top: 20px; padding: 10px; background: #f4f4f4; border-radius: 4px; }
    #jobs { margin-top: 20px; }
    .job { padding: 8px; border-bottom: 1px solid #ddd; }
    .error { color: red; }
  </style>
</head>
<body>
  <h1>Job Processor Dashboard</h1>
  <button onclick="submitJob()">Submit New Job</button>
  <div id="result"></div>
  <div id="jobs"></div>
  <script>
    const jobIds = [];
    const MAX_RETRIES = 30;

    async function submitJob() {
      try {
        const res = await fetch('/submit', { method: 'POST' });
        if (!res.ok) throw new Error(`HTTP error: ${res.status}`);
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        document.getElementById('result').innerText = `Submitted: ${data.job_id}`;
        document.getElementById('result').className = '';
        jobIds.push(data.job_id);
        pollJob(data.job_id, 0);
      } catch (err) {
        document.getElementById('result').innerText = `Error: ${err.message}`;
        document.getElementById('result').className = 'error';
      }
    }

    async function pollJob(id, retries) {
      if (retries >= MAX_RETRIES) {
        renderJob(id, 'timeout - max retries reached');
        return;
      }
      try {
        const res = await fetch(`/status/${id}`);
        if (!res.ok) throw new Error(`HTTP error: ${res.status}`);
        const data = await res.json();
        renderJob(id, data.status);
        if (data.status !== 'completed' && data.status !== 'failed') {
          setTimeout(() => pollJob(id, retries + 1), 2000);
        }
      } catch (err) {
        renderJob(id, `error: ${err.message}`);
        setTimeout(() => pollJob(id, retries + 1), 2000);
      }
    }

    function renderJob(id, status) {
      let el = document.getElementById(id);
      if (!el) {
        el = document.createElement('div');
        el.className = 'job';
        el.id = id;
        document.getElementById('jobs').appendChild(el);
      }
      el.innerText = `Job ${id.substring(0, 8)}... — ${status}`;
    }
  </script>
</body>
</html>
