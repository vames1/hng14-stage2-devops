name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install flake8
        run: pip install flake8

      - name: Lint Python API
        run: flake8 api/main.py --max-line-length=100

      - name: Lint Python Worker
        run: flake8 worker/worker.py --max-line-length=100

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Lint JavaScript
        run: cd frontend && npx eslint app.js --env node

      - name: Install hadolint
        run: |
          wget -qO /usr/local/bin/hadolint https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - name: Lint API Dockerfile
        run: hadolint api/Dockerfile

      - name: Lint Worker Dockerfile
        run: hadolint worker/Dockerfile

      - name: Lint Frontend Dockerfile
        run: hadolint frontend/Dockerfile

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          pip install fastapi uvicorn redis pytest pytest-cov httpx

      - name: Run unit tests
        run: |
          cd api
          pytest tests/ -v --cov=main --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and push API image
        run: |
          docker build -t localhost:5000/api:${{ github.sha }} -t localhost:5000/api:latest ./api
          docker push localhost:5000/api:${{ github.sha }}
          docker push localhost:5000/api:latest

      - name: Build and push Worker image
        run: |
          docker build -t localhost:5000/worker:${{ github.sha }} -t localhost:5000/worker:latest ./worker
          docker push localhost:5000/worker:${{ github.sha }}
          docker push localhost:5000/worker:latest

      - name: Build and push Frontend image
        run: |
          docker build -t localhost:5000/frontend:${{ github.sha }} -t localhost:5000/frontend:latest ./frontend
          docker push localhost:5000/frontend:${{ github.sha }}
          docker push localhost:5000/frontend:latest

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Rebuild images for scanning
        run: |
          docker build -t localhost:5000/api:latest ./api
          docker build -t localhost:5000/worker:latest ./worker
          docker build -t localhost:5000/frontend:latest ./frontend

      - name: Install Trivy
        run: |
          wget -qO- https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan API image
        run: |
          trivy image --exit-code 0 --severity CRITICAL \
            --format sarif --output api-scan.sarif \
            localhost:5000/api:latest

      - name: Scan Worker image
        run: |
          trivy image --exit-code 0 --severity CRITICAL \
            --format sarif --output worker-scan.sarif \
            localhost:5000/worker:latest

      - name: Scan Frontend image
        run: |
          trivy image --exit-code 0 --severity CRITICAL \
            --format sarif --output frontend-scan.sarif \
            localhost:5000/frontend:latest

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-scan-results
          path: |
            api-scan.sarif
            worker-scan.sarif
            frontend-scan.sarif

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cat > .env << 'ENVEOF'
          REDIS_HOST=redis
          REDIS_PORT=6379
          REDIS_PASSWORD=testpassword123
          API_URL=http://api:8000
          FRONTEND_PORT=3000
          ENVEOF

      - name: Start full stack
        run: docker-compose up --build -d

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services..."
          sleep 30
          docker-compose ps

      - name: Submit a job
        id: submit
        run: |
          JOB_ID=$(curl -s -X POST http://localhost:3000/submit | python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])")
          echo "job_id=$JOB_ID" >> $GITHUB_OUTPUT
          echo "Submitted job: $JOB_ID"

      - name: Poll until job completes
        run: |
          JOB_ID="${{ steps.submit.outputs.job_id }}"
          for i in $(seq 1 30); do
            STATUS=$(curl -s http://localhost:3000/status/$JOB_ID | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))")
            echo "Attempt $i: Job $JOB_ID status = $STATUS"
            if [ "$STATUS" = "completed" ]; then
              echo "Job completed successfully!"
              exit 0
            fi
            sleep 2
          done
          echo "Job did not complete in time!"
          exit 1

      - name: Tear down stack
        if: always()
        run: docker-compose down -v

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rolling update
        run: |
          echo "Performing rolling update..."
          docker-compose pull || true
          docker-compose up -d --no-deps --build api
          
          echo "Waiting for API health check..."
          for i in $(seq 1 12); do
            if docker-compose exec -T api python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" 2>/dev/null; then
              echo "API is healthy!"
              break
            fi
            if [ $i -eq 12 ]; then
              echo "Health check failed after 60 seconds! Rolling back..."
              docker-compose up -d --no-deps api
              exit 1
            fi
            echo "Attempt $i/12 - waiting..."
            sleep 5
          done
          
          docker-compose up -d --no-deps --build worker
          docker-compose up -d --no-deps --build frontend
          echo "Rolling update complete!"
